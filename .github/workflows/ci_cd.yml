name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: tracknest
        env:
          BOT_TOKEN: dummy_token_for_tests
          DB_USER: dummy_user
          DB_PASSWORD: dummy_password
        run: pytest tests/

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets are present
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          for var in BOT_TOKEN DB_USER DB_PASSWORD DB_HOST DB_NAME; do
            if [ -z "${!var}" ]; then echo "Missing secret: $var" && exit 1; fi
          done
          echo "All secrets present."

      - name: Test Telegram connection
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          response=$(curl -sf "https://api.telegram.org/bot${BOT_TOKEN}/getMe")
          if echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['ok']"; then
            echo "Telegram connection OK"
            echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"Bot: @{d['result']['username']}\")"
          else
            echo "Telegram connection FAILED: $response"
            exit 1
          fi

      # TODO: add your deploy steps here.
      # Common options:
      #   - SSH into a VPS and restart the bot process
      #   - Push to Railway / Render / Heroku via their CLI
      #   - Build and push a Docker image

      - name: Deploy (not configured yet)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: echo "Deploy step not configured yet — add your steps above."
